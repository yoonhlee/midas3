services:
  jobsim:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.server
    environment:
      PORT: "8080"
    ports:
      - "${JOBSIM_HOST_PORT:-8080}:8080"
    volumes:
      - ./data/api_raw:/app/data/api_raw:ro
      - ./data/additional_search:/app/data/additional_search:ro
      - ./missions:/app/missions
      - ./outputs:/app/outputs
      - ./reports:/app/reports
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
